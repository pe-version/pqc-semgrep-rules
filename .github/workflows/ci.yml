name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install semgrep

      - name: Validate rule schema
        run: semgrep --validate --config rules/

      - name: Run rule tests
        run: semgrep scan --test --config rules/ rules/
