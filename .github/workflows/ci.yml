name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install semgrep

      - name: Validate rule schema
        run: semgrep --validate --config rules/

      - name: Run rule tests (auto-discovers one fixture per rule)
        run: semgrep scan --test --config rules/ rules/

      - name: Verify parallel TypeScript fixtures
        run: python3 scripts/test_typescript_fixtures.py
