rules:
  - id: pqc.java.des
    languages: [java]
    severity: ERROR
    message: |
      DES detected (Java JCA). 56-bit key brute-forceable.
      Migrate to AES/GCM/NoPadding.
    metadata:
      category: security
      pqc-category: classically-broken
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      nist-pqc-replacement: "AES/GCM/NoPadding (AES-256)"
    pattern-either:
      - pattern: Cipher.getInstance("DES")
      - pattern: Cipher.getInstance("DES", ...)
      - pattern: Cipher.getInstance("DES/CBC/PKCS5Padding")
      - pattern: Cipher.getInstance("DES/ECB/PKCS5Padding")
      - pattern: Cipher.getInstance("DES/CBC/NoPadding")
      - pattern: Cipher.getInstance("DES/ECB/NoPadding")

  - id: pqc.java.3des
    languages: [java]
    severity: WARNING
    message: |
      Triple DES (DESede) detected (Java JCA). Sweet32 vulnerable;
      deprecated by NIST. Migrate to AES/GCM/NoPadding.
    metadata:
      category: security
      pqc-category: classically-broken
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      nist-pqc-replacement: "AES/GCM/NoPadding (AES-256)"
    pattern-either:
      - pattern: Cipher.getInstance("DESede")
      - pattern: Cipher.getInstance("DESede", ...)
      - pattern: Cipher.getInstance("DESede/CBC/PKCS5Padding")
      - pattern: Cipher.getInstance("DESede/ECB/PKCS5Padding")
      - pattern: Cipher.getInstance("DESede/CBC/NoPadding")
      - pattern: Cipher.getInstance("TripleDES")
      - pattern: Cipher.getInstance("TripleDES", ...)

  - id: pqc.java.rc4
    languages: [java]
    severity: ERROR
    message: |
      RC4 (ARCFOUR) detected (Java JCA). Keystream biases; prohibited by
      RFC 7465. Migrate to AES-256/GCM or ChaCha20-Poly1305.
    metadata:
      category: security
      pqc-category: classically-broken
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      nist-pqc-replacement: "AES/GCM/NoPadding or ChaCha20-Poly1305"
    pattern-either:
      - pattern: Cipher.getInstance("RC4")
      - pattern: Cipher.getInstance("RC4", ...)
      - pattern: Cipher.getInstance("ARCFOUR")
      - pattern: Cipher.getInstance("ARCFOUR", ...)
