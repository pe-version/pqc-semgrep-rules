rules:
  - id: pqc.javascript.des
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      DES detected. 56-bit key brute-forceable in seconds.
      Migrate to AES-256-GCM.
    metadata:
      category: security
      pqc-category: classically-broken
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      nist-pqc-replacement: "AES-256-GCM"
    pattern-either:
      - pattern: crypto.createCipheriv("des", ...)
      - pattern: crypto.createCipheriv('des', ...)
      - pattern: crypto.createCipheriv("des-cbc", ...)
      - pattern: crypto.createCipheriv('des-cbc', ...)
      - pattern: crypto.createCipheriv("des-ecb", ...)
      - pattern: crypto.createCipheriv('des-ecb', ...)

  - id: pqc.javascript.3des
    languages: [javascript, typescript]
    severity: WARNING
    message: |
      Triple DES detected. Vulnerable to Sweet32 birthday attacks.
      Migrate to AES-256-GCM.
    metadata:
      category: security
      pqc-category: classically-broken
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      nist-pqc-replacement: "AES-256-GCM"
    pattern-either:
      - pattern: crypto.createCipheriv("des-ede3", ...)
      - pattern: crypto.createCipheriv('des-ede3', ...)
      - pattern: crypto.createCipheriv("des-ede3-cbc", ...)
      - pattern: crypto.createCipheriv('des-ede3-cbc', ...)
      - pattern: crypto.createCipheriv("des3", ...)
      - pattern: crypto.createCipheriv('des3', ...)

  - id: pqc.javascript.rc4
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      RC4 detected. Keystream biases make it broken; prohibited by RFC 7465.
      Migrate to AES-256-GCM or ChaCha20-Poly1305.
    metadata:
      category: security
      pqc-category: classically-broken
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      nist-pqc-replacement: "AES-256-GCM or ChaCha20-Poly1305"
    pattern-either:
      - pattern: crypto.createCipheriv("rc4", ...)
      - pattern: crypto.createCipheriv('rc4', ...)
      - pattern: crypto.createCipheriv("rc4-40", ...)
      - pattern: crypto.createCipheriv('rc4-40', ...)
