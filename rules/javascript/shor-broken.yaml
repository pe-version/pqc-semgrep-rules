rules:
  - id: pqc.javascript.rsa
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      RSA detected. Broken by Shor's algorithm on a sufficiently large
      fault-tolerant quantum computer (CRQC) and subject to harvest-now-
      decrypt-later attacks. Migrate to ML-KEM (FIPS 203) for KEM or
      ML-DSA (FIPS 204) for signatures.
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "ML-KEM (FIPS 203) or ML-DSA (FIPS 204)"
    pattern-either:
      - pattern: crypto.generateKeyPair("rsa", ...)
      - pattern: crypto.generateKeyPair('rsa', ...)
      - pattern: crypto.generateKeyPairSync("rsa", ...)
      - pattern: crypto.generateKeyPairSync('rsa', ...)

  - id: pqc.javascript.ec
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      EC key (ECDSA / ECDH) detected. Broken by Shor's algorithm on a CRQC.
      Migrate signatures to ML-DSA (FIPS 204) or SLH-DSA (FIPS 205);
      migrate key agreement to ML-KEM (FIPS 203) or hybrid X25519 + ML-KEM.
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "ML-DSA (FIPS 204), SLH-DSA (FIPS 205), or ML-KEM (FIPS 203)"
    pattern-either:
      - pattern: crypto.generateKeyPair("ec", ...)
      - pattern: crypto.generateKeyPair('ec', ...)
      - pattern: crypto.generateKeyPairSync("ec", ...)
      - pattern: crypto.generateKeyPairSync('ec', ...)
      - pattern: crypto.createECDH(...)

  - id: pqc.javascript.dsa
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      DSA detected. Broken by Shor's algorithm; deprecated by NIST.
      Migrate to ML-DSA (FIPS 204).
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "ML-DSA (FIPS 204)"
    pattern-either:
      - pattern: crypto.generateKeyPair("dsa", ...)
      - pattern: crypto.generateKeyPair('dsa', ...)
      - pattern: crypto.generateKeyPairSync("dsa", ...)
      - pattern: crypto.generateKeyPairSync('dsa', ...)

  - id: pqc.javascript.dh
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      Finite-field Diffie-Hellman detected. Broken by Shor's algorithm on
      a CRQC. Migrate to ML-KEM (FIPS 203).
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "ML-KEM (FIPS 203)"
    pattern-either:
      - pattern: crypto.createDiffieHellman(...)
      - pattern: crypto.getDiffieHellman(...)

  - id: pqc.javascript.x25519
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      X25519 detected. Curve25519 ECDH is broken by Shor's algorithm
      identically to other ECDH variants. Hybrid X25519 + ML-KEM is the
      recommended near-term migration.
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "Hybrid X25519 + ML-KEM (FIPS 203)"
    pattern-either:
      - pattern: crypto.generateKeyPair("x25519", ...)
      - pattern: crypto.generateKeyPair('x25519', ...)
      - pattern: crypto.generateKeyPairSync("x25519", ...)
      - pattern: crypto.generateKeyPairSync('x25519', ...)

  - id: pqc.javascript.ed25519
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      Ed25519 detected. EdDSA over Curve25519 is broken by Shor's algorithm
      identically to ECDSA. Migrate to ML-DSA (FIPS 204).
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "ML-DSA (FIPS 204) or hybrid Ed25519 + ML-DSA"
    pattern-either:
      - pattern: crypto.generateKeyPair("ed25519", ...)
      - pattern: crypto.generateKeyPair('ed25519', ...)
      - pattern: crypto.generateKeyPairSync("ed25519", ...)
      - pattern: crypto.generateKeyPairSync('ed25519', ...)
