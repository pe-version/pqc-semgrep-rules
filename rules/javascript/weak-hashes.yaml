rules:
  - id: pqc.javascript.md5
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      MD5 detected. Collisions trivially producible; unsafe for any
      security purpose. Migrate to SHA-256 / SHA-3-256.
    metadata:
      category: security
      pqc-category: classically-broken
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      nist-pqc-replacement: "SHA-256 / SHA-3-256"
    pattern-either:
      - pattern: crypto.createHash("md5", ...)
      - pattern: crypto.createHash('md5', ...)
      - pattern: crypto.createHash("MD5", ...)
      - pattern: crypto.createHash('MD5', ...)
      - pattern: crypto.createHash("md5")
      - pattern: crypto.createHash('md5')
      - pattern: crypto.createHash("MD5")
      - pattern: crypto.createHash('MD5')

  - id: pqc.javascript.sha1
    languages: [javascript, typescript]
    severity: WARNING
    message: |
      SHA-1 detected. Practical collisions demonstrated (SHAttered 2017);
      deprecated by NIST. Migrate to SHA-256 / SHA-3-256.
    metadata:
      category: security
      pqc-category: classically-broken
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      nist-pqc-replacement: "SHA-256 / SHA-3-256"
    pattern-either:
      - pattern: crypto.createHash("sha1", ...)
      - pattern: crypto.createHash('sha1', ...)
      - pattern: crypto.createHash("SHA1", ...)
      - pattern: crypto.createHash('SHA1', ...)
      - pattern: crypto.createHash("sha1")
      - pattern: crypto.createHash('sha1')
      - pattern: crypto.createHash("SHA1")
      - pattern: crypto.createHash('SHA1')
