rules:
  - id: pqc.go.rsa
    languages: [go]
    severity: ERROR
    message: |
      RSA detected (Go crypto/rsa). Broken by Shor's algorithm on a CRQC
      and subject to harvest-now-decrypt-later attacks. Migrate to
      ML-KEM (FIPS 203) for KEM or ML-DSA (FIPS 204) for signatures.
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "ML-KEM (FIPS 203) or ML-DSA (FIPS 204)"
    pattern-either:
      - pattern: rsa.GenerateKey(...)
      - pattern: rsa.GenerateMultiPrimeKey(...)

  - id: pqc.go.ecdsa
    languages: [go]
    severity: ERROR
    message: |
      ECDSA detected (Go crypto/ecdsa). Broken by Shor's algorithm on a CRQC.
      Migrate to ML-DSA (FIPS 204) or SLH-DSA (FIPS 205).
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "ML-DSA (FIPS 204) or SLH-DSA (FIPS 205)"
    pattern-either:
      - pattern: ecdsa.GenerateKey(...)

  - id: pqc.go.ecdh
    languages: [go]
    severity: ERROR
    message: |
      ECDH detected (Go crypto/ecdh). Broken by Shor's algorithm on a CRQC
      and subject to harvest-now-decrypt-later attacks. Migrate to ML-KEM
      (FIPS 203) or hybrid X25519 + ML-KEM.
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "Hybrid X25519 + ML-KEM (FIPS 203)"
    pattern-either:
      - pattern: ecdh.P256().GenerateKey(...)
      - pattern: ecdh.P384().GenerateKey(...)
      - pattern: ecdh.P521().GenerateKey(...)

  - id: pqc.go.dsa
    languages: [go]
    severity: ERROR
    message: |
      DSA detected (Go crypto/dsa). Broken by Shor's algorithm on a CRQC;
      deprecated by NIST. Migrate to ML-DSA (FIPS 204).
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "ML-DSA (FIPS 204)"
    pattern-either:
      - pattern: dsa.GenerateKey(...)
      - pattern: dsa.GenerateParameters(...)

  - id: pqc.go.x25519
    languages: [go]
    severity: ERROR
    message: |
      X25519 detected (Go crypto/ecdh). Curve25519 ECDH broken by Shor's
      algorithm identically to other ECDH variants. Hybrid X25519 + ML-KEM
      is the recommended near-term migration.
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "Hybrid X25519 + ML-KEM (FIPS 203)"
    pattern-either:
      - pattern: ecdh.X25519().GenerateKey(...)

  - id: pqc.go.ed25519
    languages: [go]
    severity: ERROR
    message: |
      Ed25519 detected (Go crypto/ed25519). EdDSA over Curve25519 broken
      by Shor's algorithm identically to ECDSA. Migrate to ML-DSA (FIPS 204).
    metadata:
      category: security
      pqc-category: shor-broken
      cwe:
        - "CWE-326: Inadequate Encryption Strength"
      nist-pqc-replacement: "ML-DSA (FIPS 204) or hybrid Ed25519 + ML-DSA"
    pattern-either:
      - pattern: ed25519.GenerateKey(...)
